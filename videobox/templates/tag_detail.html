{% extends "base.html" %}

{% block title %}
  <title>{{tag.name}} • Videobox</title>
{% endblock %}

{% block content %}
  <main id="main">
    <h1 class="text-xlg mb-2 font-weight-black">{{tag.name}}</h1>
    <p class="text-muted mb-5">Found <strong>{{series_count}}</strong> series</p>
    <div class="d-flex align-items-center">
      Sort by&nbsp; 
      <fieldset class="">
        <div class="radio-button-group">
          <label class="radio-button-group__label"><img aria-hidden="true" class="icon" src="/static/icon-trend-up.svg"
            width="20" height="20" alt="">
            <input class="radio-button-group__input" type="radio" {{ 'checked' if series_sorting=='popularity' else '' }}
              name="sort" value="popularity">
          </label>
          <label class="radio-button-group__label"><img aria-hidden="true" class="icon" src="/static/icon-sort-asc.svg"
              width="20" height="20" alt="">
            <input class="radio-button-group__input" type="radio" {{ 'checked' if series_sorting=='asc' else '' }}
              name="class" value="asc">
          </label>
          <label class="radio-button-group__label"><img aria-hidden="true" class="icon" src="/static/icon-sort-desc.svg"
            width="20" height="20" alt="">
            <input class="radio-button-group__input" type="radio" {{ 'checked' if series_sorting=='desc' else '' }}
              name="class" value="desc">
          </label>
        </div>
      </fieldset>  
    </div>

    <div class="load-more-wrapper">
      {% include "_tag-card-grid.html" %}
    </div>
  </main>         
{% endblock %}
